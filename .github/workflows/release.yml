name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'tag to publish (e.g. v0.1.0-dev.1). leave blank to use the most recent pushed tag'
        required: false
        default: ''

# Don't burn CI minutes on tag churn — only one release at a time per ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # linux glibc — covers Ubuntu, Debian, Fedora, RHEL, Arch, Mint
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            arch: x86_64
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            arch: aarch64
            archive: tar.gz
            cross: true
            # image override is in Cross.toml (the CROSS_IMAGE env
            # var alone is ignored by cross-rs 0.2.5).
          # macOS — Intel + Apple silicon
          - target: x86_64-apple-darwin
            os: macos-14
            arch: x86_64
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            arch: aarch64
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: build agidb-cli (release, stripped)
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p agidb-cli --bin agidb
          else
            cargo build --release --target ${{ matrix.target }} -p agidb-cli --bin agidb
          fi
          # strip for size — release profile already strips but be defensive
          if [ "${{ matrix.os }}" = "ubuntu-latest" ]; then
            strip "target/${{ matrix.target }}/release/agidb"
          fi
          ls -lh "target/${{ matrix.target }}/release/agidb"

      - name: package
        run: |
          mkdir -p dist
          ASSET="agidb-${{ github.ref_name }}-${{ matrix.os == 'ubuntu-latest' && 'linux' || 'darwin' }}-${{ matrix.arch }}.tar.gz"
          BIN="target/${{ matrix.target }}/release/agidb"
          cp "$BIN" "dist/agidb"
          tar -C dist -czf "$ASSET" agidb
          echo "packaged: $ASSET"
          ls -lh "$ASSET"

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agidb-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ github.workspace }}/*.tar.gz
          if-no-files-found: error
          retention-days: 14

  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: list
        run: ls -lh artifacts/

      - name: generate checksums.txt
        working-directory: artifacts
        run: |
          (cd .. && find artifacts -type f \( -name '*.tar.gz' \) -print0 | xargs -0 sha256sum) > checksums.txt
          cat checksums.txt

      - name: publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/checksums.txt
          generate_release_notes: true
          draft: true            # leave draft so we can sanity-check before publishing
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}