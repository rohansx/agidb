name: release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'tag to publish (e.g. v0.1.0-dev.1). leave blank to use the most recent pushed tag'
        required: false
        default: ''

# Don't burn CI minutes on tag churn — only one release at a time per ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: build ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # linux glibc — covers Ubuntu, Debian, Fedora, RHEL, Arch, Mint.
          # arm64 uses the hosted GitHub arm64 runner (free for public
          # repos since Aug 2024) which ships gcc 12 / glibc 2.39 —
          # the same toolchain ort-sys 2 expects. The cross-rs route
          # tried earlier failed because the project's aarch64 images
          # only ship gcc 9 / glibc 2.31, which is too old to link
          # onnxruntime's absl::inlined_vector_storage.
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            arch: x86_64
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            arch: aarch64
            archive: tar.gz
          # macOS — Intel + Apple silicon
          - target: x86_64-apple-darwin
            os: macos-14
            arch: x86_64
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            arch: aarch64
            archive: tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: build agidb-cli (release, stripped)
        run: |
          cargo build --release --target ${{ matrix.target }} -p agidb-cli --bin agidb
          # strip for size — release profile already strips but be defensive
          strip "target/${{ matrix.target }}/release/agidb" 2>/dev/null || true
          ls -lh "target/${{ matrix.target }}/release/agidb"

      - name: package
        run: |
          mkdir -p dist
          case "${{ matrix.os }}" in
            ubuntu-*|ubuntu) OS=linux ;;
            macos-*)        OS=darwin ;;
            *)              OS=unknown ;;
          esac
          ASSET="agidb-${{ github.ref_name }}-${OS}-${{ matrix.arch }}.tar.gz"
          BIN="target/${{ matrix.target }}/release/agidb"
          cp "$BIN" "dist/agidb"
          tar -C dist -czf "$ASSET" agidb
          echo "packaged: $ASSET"
          ls -lh "$ASSET"

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agidb-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ github.workspace }}/*.tar.gz
          if-no-files-found: error
          retention-days: 14

  release:
    name: publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: list
        run: ls -lh artifacts/

      - name: generate checksums.txt
        working-directory: artifacts
        run: |
          # Emit `<sha>   <basename>` lines (no path prefix). The awk
          # pulls the hash and the file portion back out separately;
          # the sed then strips the leading "./" from each path so
          # downstream tools can match on basename alone.
          find . -type f -name '*.tar.gz' -exec sha256sum {} \; \
            | awk '{print $1, $2}' \
            | sed 's|^\./||' \
            > checksums.txt
          cat checksums.txt

      - name: publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/checksums.txt
            install.sh
          generate_release_notes: true
          draft: true            # leave draft so we can sanity-check before publishing
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}