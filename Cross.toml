# Cross-rs configuration for release builds.
# https://github.com/cross-rs/cross#configuration-file
#
# The `main` (default) cross image for aarch64-unknown-linux-gnu ships
# gcc 9 / glibc 2.31 which is too old to link onnxruntime's
# absl::inlined_vector_storage. The bookworm-flavored image ships
# gcc 12 / glibc 2.36 which matches what ort-sys 2 expects.
#
# Local sanity check:
#   CROSS_CONTAINER_IN_CONTAINER=true cross build \
#       --release --target aarch64-unknown-linux-gnu -p agidb-cli --bin agidb

[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/cross-rs/aarch64-unknown-linux-gnu:bookworm"